services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: sensor-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sensor_db}
      POSTGRES_USER: ${POSTGRES_USER:-sensor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sensor_pass}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sensor_user} -d ${POSTGRES_DB:-sensor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sensor-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-sensor_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-sensor_pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-sensor_vhost}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sensor-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-sensor_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sensor_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sensor_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-sensor_user}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-sensor_pass}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-sensor_vhost}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  timescale_data:
  rabbitmq_data: